{% extends 'base.html' %}
{% block title %}Blog{% endblock %}

{% block content %}
    <br>
    <h1>blog</h1>
    <br>
    {% for post in posts %}
    <div class="card">
        <div class="card-body">
            <h2>
                <a href="{{ post.url }}">{{ post.title }}</a>
            </h2>
            <p class="text-muted">{{ post.excerpt }}</p>
        </div>
    </div>
    <br>
    {% endfor %}
{% endblock%}
